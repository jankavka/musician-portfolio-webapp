spring:
  datasource:
    url: "jdbc:mysql://db:3306/vlastik?createDatabaseIfNotExist=true"
    driver-class-name: "com.mysql.cj.jdbc.Driver"
    username: root
    password: 1234
    platform: MYSQL
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
server:
  tomcat:
    max-swallow-size: -1
