<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/admin-layout.html :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="admin-body">
    <nav th:replace="~{fragments/admin-layout.html :: navigation}"></nav>
    <div class="container">
        <h1>Detail koncertu</h1>
        <div class="mb-3">
            <a class="btn btn-outline-light" th:href="@{/admin/koncerty/upravit/ + ${concert.id}}">Upravit</a>
            <a class="btn btn-outline-danger" name="deleteButton" th:id="${concert.id}">Vymazat</a>
        </div>
        <table class="table" style="max-width: 40dvh;">
            <tbody>
                <tr>
                    <td>Název akce</td>
                    <td th:id="${'entity' + concert.id}" th:text="${concert.name}"></td>
                </tr>
                <tr>
                    <td>Kapela</td>
                    <td th:text="${concert.band}"></td>
                </tr>
                <tr>
                    <td>Čas</td>
                    <td th:text="${concert.formattedTime}"></td>
                </tr>
                <tr>
                    <td>Odkaz</td>
                    <td th:text="${concert.linkToEvent}"></td>
                </tr>
            </tbody>
        </table>
        <div>
            <a class="btn btn-warning" th:href="@{/admin/koncerty}">Zpět</a>
        </div>

    </div>

    <footer th:replace="~{fragments/admin-layout.html :: footer}"></footer>


</body>
</html>
