<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/admin-layout.html :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body class="admin-body">
    <nav th:replace="~{fragments/admin-layout.html :: navigation}"></nav>

    <div th:if="${success}" th:text="${success}" class="alert alert-success text-center py-2 mb-2"></div>

    <div class="container">
        <h1>Detail</h1>
        <a class="btn btn-warning mb-3" href="/admin/foto">Zpět</a>

        <table class="table" style="max-width: 40dvh;">
            <tbody>
                <tr>
                    <td>Název alba:</td>
                    <td th:text="${album.name}"></td>
                </tr>
                <tr>
                    <td>Popis:</td>
                    <td th:text="${album.description}"></td>
                </tr>
            </tbody>
        </table>
        <div>
            <div class="d-flex">
                <div th:each="photo : ${album.photos}" class="card my-card">
                    <img class="card-img-top" th:id="${'entity' + photo.id}" th:src="${'/' + photo.url}"
                        th:alt="${photo.name}">
                    <div class="card-body">
                        <a class="btn btn-danger" name="deleteButton" th:id="${photo.id}">Vymazat</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/admin-layout.html :: footer}"></footer>

</body>

</html>
