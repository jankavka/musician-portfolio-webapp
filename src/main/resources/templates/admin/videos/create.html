<!DOCTYPE html>
<html lang="en">

<head th:replace="~{fragments/admin-layout.html :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body class="admin-body">
    <nav th:replace="~{fragments/admin-layout.html :: navigation}"></nav>
    <div class="container">
        <article>
            <h1>Nové video</h1>
            <form method="post" th:action="@{/admin/video/novy}">
                <div class="mb-3">
                    <label class="form-label" for="link">Adresa videa</label>
                    <input class="form-control" type="text" id="link" th:field="${videoDto.url}">
                    <small class="error" th:errors="${videoDto.url}"></small>
                    <small class="error" th:if="${error}" th:text="${error}"></small>
                </div>
                <div class="mb-3">
                    <input class="btn btn-primary" type="submit" value="Uložit">
                    <a class="btn btn-warning" th:href="@{/admin/video}">Zpět</a>
                </div>
            </form>
        </article>

    </div>

    <footer th:replace="~{fragments/admin-layout.html :: footer}"></footer>

</body>

</html>
