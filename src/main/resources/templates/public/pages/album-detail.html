<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout.html :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <nav th:replace="~{fragments/layout.html :: navigation}"></nav>
    <div class="container">
        <article>
            <h1 class="mb-3">Detail alba</h1>
            <div>
                <table class="table my-table-width">
                    <tbody>
                        <tr>
                            <td>Název alba</td>
                            <td th:text="${album.name}"></td>
                        </tr>
                        <tr>
                            <td>Popis</td>
                            <td th:text="${album.description}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="d-flex">
                <div th:each="photo : ${album.photos}" class="picture-box d-grid gap-3">
                    <a data-fslightbox th:href="@{'../' + ${photo.url}}">
                        <img class="my-picture" th:src="@{'../' + ${photo.url}}" alt="${photo.name}">

                    </a>
                </div>
            </div>

        </article>

    </div>
    <footer th:replace="~{fragments/layout.html :: footer}"></footer>

    <script src="/../../script/fslightbox-basic-3.7.4/fslightbox.js"></script>

</body>

</html>
