<!DOCTYPE html>
<html lang="cs" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout.html :: head}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container" style="min-height: 90.5dvh;">
        <article>
            <h1>Přihlášení</h1>
            <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
            <div class="alert alert-danger" th:if="${param.error}">Chyba během přihlašování. Zkuste to znovu.</div>
            <a th:href="@{/registration}">Registrovat</a>
            <form method="post" th:action="@{/login}">
                <div class="mb-3">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" type="text" id="email" name="email">
                </div>
                <div class="mb-3">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-control" type="text" id="password" name="password">
                </div>
                <div class="mb-3">
                    <input class="btn btn-primary" type="submit">
                </div>
            </form>
            <div class="mb-3">
                <a th:href="@{/}">Zpět na veřejné stránky</a>
            </div>
            <div>
                <a th:href="@{/zapomenute-heslo}">Zapomenuté heslo</a>
            </div>
        </article>
    </div>

    <footer th:replace="~{fragments/layout.html :: footer}"></footer>
</body>

</html>
